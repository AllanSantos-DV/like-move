name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: like-move/requirements.txt

      - name: Install dependencies
        run: pip install -r like-move/requirements.txt pyinstaller

      - name: Build executable
        working-directory: like-move
        run: python -m PyInstaller like-move.spec --noconfirm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "like-move ${{ github.ref_name }}"
          generate_release_notes: true
          draft: false
          prerelease: false
          files: like-move/dist/like-move.exe
